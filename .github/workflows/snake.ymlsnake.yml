name: Generate Snake Animation

on:
  schedule: # Execute automatically every 24 hours
    - cron: "0 0 * * *" 
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Generate the snake animation out of your contribution graph
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: the-it-guy
          # These colors match your Tungsten & Cyan theme (dark gray to neon blue)
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00E5FF&color_dots=#1c1e21,#2A2A2A,#38A3D1,#1D99F3,#00E5FF
          
      # Push the generated SVG to a separate "output" branch so it doesn't clutter your main code
      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
